<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <div class="piano-container">
        <!-- white -->
        <div class="note white" id="key-a">C (a)</div>
        <div class="note white" id="key-s">D (s)</div>
        <div class="note white" id="key-d">E (d)</div>
        <div class="note white" id="key-f">F (f)</div>
        <div class="note white" id="key-g">G (g)</div>
        <div class="note white" id="key-h">A (h)</div>
        <div class="note white" id="key-j">B (j)</div>
        <div class="note white" id="key-k">C (k)</div>
        <!-- black -->
        <div class="note black" id="key-w">C# (w)</div>
        <div class="note black" id="key-e">D# (e)</div>
        <div class="note black" id="key-t">F# (t)</div>
        <div class="note black" id="key-y">G# (y)</div>
        <div class="note black" id="key-u">A# (u)</div>
      </div>
    </div>
  <script src="index.js"></script>
  </body>
</html>
